services:
  - type: web
    name: jambo-rafiki-backend-web
    env: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate --noinput
    startCommand: gunicorn jambo_rafiki.wsgi:application --bind 0.0.0.0:$PORT --workers 3 --timeout 60
    healthCheckPath: /ready/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        value: https://jamborafiki.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://jamborafiki.vercel.app
      - key: USE_S3_MEDIA
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: SECURITY_LOG_LEVEL
        value: WARNING
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jambo-rafiki-postgres
          property: connectionString
      - key: ALLOWED_HOSTS
        value: jambo-rafiki-backend-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://jamborafiki.vercel.app,https://jambo-rafiki-backend-web.onrender.com
      # EMAIL and SendGrid variables removed
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_CALLBACK_TOKEN
        sync: false
      - key: MPESA_CALLBACK_SIGNATURE_SECRET
        sync: false
      - key: MPESA_CALLBACK_SIGNATURE_HEADER
        value: X-MPESA-SIGNATURE
      # Stripe variables removed
      # Sentry variables removed

  - type: worker
    name: jambo-rafiki-backend-worker
    env: python
    plan: starter
    region: oregon
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py process_jobs
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: FRONTEND_URL
        value: https://jamborafiki.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://jamborafiki.vercel.app
      - key: USE_S3_MEDIA
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: SECURITY_LOG_LEVEL
        value: WARNING
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jambo-rafiki-postgres
          property: connectionString
      - key: ALLOWED_HOSTS
        value: jambo-rafiki-backend-web.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://jamborafiki.vercel.app,https://jambo-rafiki-backend-web.onrender.com
      # EMAIL and SendGrid variables removed
      - key: MPESA_ENVIRONMENT
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_CALLBACK_TOKEN
        sync: false
      - key: MPESA_CALLBACK_SIGNATURE_SECRET
        sync: false
      - key: MPESA_CALLBACK_SIGNATURE_HEADER
        value: X-MPESA-SIGNATURE
      # Stripe variables removed
      # Sentry variables removed

databases:
  - name: jambo-rafiki-postgres
    plan: basic-1gb
    region: oregon
    databaseName: jambo_rafiki
    user: jambo_rafiki_user
